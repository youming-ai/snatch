services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: snatch-api
    ports:
      - "${API_PORT:-38701}:3001"
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - PORT=3001
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-10}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60000}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    networks:
      - snatch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: snatch-web
    ports:
      - "${WEB_PORT:-38700}:4321"
    environment:
      # Internal URL for SSR → API (container network). The web SSR layer
      # proxies the download stream, so the API never needs public exposure.
      - API_URL_INTERNAL=${API_URL_INTERNAL:-http://api:3001}
      - HOST=0.0.0.0
      - PORT=4321
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - snatch
    healthcheck:
      test: ["CMD-SHELL", "bun -e 'fetch(\"http://localhost:4321/\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

networks:
  snatch:
    driver: bridge
