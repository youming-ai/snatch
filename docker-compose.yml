services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: snatch-api
    ports:
      - "${API_PORT:-38701}:3001"
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - PORT=3001
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-10}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60000}
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
