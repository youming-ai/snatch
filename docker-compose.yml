services:
  app:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: snatch-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-38700}:3001"
    environment:
      - PORT=3001
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
